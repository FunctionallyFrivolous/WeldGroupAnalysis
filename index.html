<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset ="UTF-8">
        <title>Weld Group Analysis</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body style="margin-left: 20px;">
        <h2>Weld Group Analysis</h2>
        <b style="margin-top: 4px; font-size: 9pt; font-family: sans-serif;">
        <label style="margin-left: 0px;">Show/Hide:</label>
        <button id="toggleRx">Rx<sub></sub></button>
        <button id="toggleStress" style="opacity: 0.5; font-family: serif">τ<sub>tot</sub></button>
        <button id="toggleTDir" style="opacity: 0.5; font-family: serif">τ'<sub></sub></button>
        <button id="toggleTTor" style="opacity: 0.5; font-family: serif">τ''<sub></sub></button>
        <button id="toggleTMax" style="opacity: 0.5; font-family: serif">τ<sub>max</sub></button>
        <!-- <button id="toggleCoords">Coords</button> -->
        <button id="toggleLoadProps" style="opacity: 0.5">Load Props<sub></sub></button>
        <button id="toggleWeldProps" style="opacity: 0.5">Weld Props<sub></sub></button>
        </b>
        <br>
        <svg id="topView" width="500" height="500" 
                style="border:1px solid black;"
                viewBox="0 0 500 500">
        </svg>
        <br>
        <b style="margin-top: 4px; font-size: 9pt; font-family: sans-serif;">
        <!-- <button id="lockGeom">Lock Geometry</button> -->
        <!-- <label style="margin-left: 0px;">Units:</label> -->
        <!-- <button id="toggleUnits">Inches</button> -->
        <!-- <label style="margin-left: 0px;">Add Stuff:</label> -->
        <!-- <button id="addWeld">Add Weld</button>
        <button id="removeWeld">Remove Weld</button>
        <button id="addLoad">Add Load</button>
        <button id="removeLoad" disabled=true>Remove Load</button> -->
        <br>
        <span>
        <label id="weldLab">Weld 1: </label>
        <input type="number" id="weldLen" placeholder="Length" min="1" step="1">
        <span id="lUnits">"</span>
        x
        <input type="number" id="weldSize" placeholder="Size" min="0.125" value="0" step="0.125">
        <span id="thkUnits">"</span>
        Coords: (
        <input type="number" id="weldStartX" placeholder="x" min="0.1" value="0" step="0.1">
        ,
        <input type="number" id="weldStartY" placeholder="y" min="0.1" value="0" step="0.1">
        ) to (
        <input type="number" id="weldEndX" placeholder="x" min="0.1" value="0" step="0.1">
        ,
        <input type="number" id="weldEndY" placeholder="y" min="0.1" value="0" step="0.1">
        )
        <br>
        <br>
        <label id="loadLab">Load 1: </label>
        <input type="number" id="loadMag" placeholder="Mag" min="1" step="1">
        <span id="fUnits">lbf</span>
        @
        <input type="number" id="loadAng" placeholder="Angle" min="0" max="360" value="0" step="1">°
        Coords: (
        <input type="number" id="loadStartX" placeholder="x" min="0.1" value="0" step="0.1">
        ,
        <input type="number" id="loadStartY" placeholder="y" min="0.1" value="0" step="0.1">
        )
        </span>
        <br>
        <label>Coordinate Axes:</label>
        <input  style="margin-bottom: 5px; margin-top: 12px" type="range" id="axisScaleSlider" orient="horizontal" value="50" min="1" max="500" step="1">
        <br>
        <label>Snap Threshold:</label>
        <input  style="margin-bottom: 5px; margin-top: 5px" type="range" id="snapDistSlider" orient="horizontal" value="10" min="0" max="50" step="1">
        <br>
        <label>Load Scale:</label>
        <input type="range" style="margin-bottom: 5px; margin-top: 5px;" id="loadScaleSlider" orient="horizontal" value="0.5" min="0.05" max="5" step="0.05">
        <br>
        <label>Stress Scale:</label>
        <input  style="margin-bottom: 5px; margin-top: 5px" type="range" id="stressScaleSlider" orient="horizontal" value="10" min="1" max="100" step="1">
        <br>
        </b>
        <p id="debugOutputs"></p>
        <script src="conversions.js"></script>
        <script src="handlers.js"></script>
        <script src="functions.js"></script>
        <script src="defaults.js"></script>
        <script src="main.js"></script>
    </body>
</html>
