<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset ="UTF-8">
        <title>Weld Group Analysis</title>
        <script src="https://d3js.org/d3.v7.min.js"></script>
        <link rel="stylesheet" href="style.css">
    </head>
    <body style="margin-left: 20px;">
        <h2>Weld Group Analysis</h2>
        <b style="margin-top: 4px; font-size: 9pt; font-family: sans-serif;">
        <label>Show/Hide:</label>
        <button id="toggleRx">Reactions</button>
        <button id="toggleStress">Total Stress</button>
        <button id="toggleTComps">Stress Components</button>
        <br>
        <label>Load Scale:</label>
        <input type="range" id="loadScaleSlider" orient="horizontal" value="0.5" min="0.1" max="3" step="0.05">
        <!-- <br> -->
        <label>Stress Scale:</label>
        <input  style="margin-bottom: 12px;" type="range" id="stressScaleSlider" orient="horizontal" value="10" min="1" max="100" step="1">
        </b>
        <br>
        <svg id="topView" width="500" height="500" 
                style="border:1px solid black;"
                viewBox="0 0 500 500">
        </svg>
        <br>
        <b style="margin-top: 4px; font-size: 9pt; font-family: sans-serif;">
        <labelp>Units:</label>
        <button id="toggleUnits">Inches</button>
        <label>Add Stuff:</label>
        <button id="addWeld">Add Weld</button>
        <button id="addLoad">Add Load</button>
        <br>
        </b>
        <p id="debugOutputs"></p>
        <script src="conversions.js"></script>
        <script src="handlers.js"></script>
        <script src="functions.js"></script>
        <script src="defaults.js"></script>
        <script src="main.js"></script>
    </body>
</html>
